# Clash 配置

#region 主要端口设置
# HTTP 代理端口
port: 7890
# SOCKS5 代理端口
socks-port: 7891
# HTTP(S) and SOCKS5 共用端口
mixed-port: 7892
# Linux 和 macOS 的 redir 透明代理端口 (重定向 TCP 和 TProxy UDP 流量)
redir-port: 7893
# Linux 的透明代理端口（适用于 TProxy TCP 和 TProxy UDP 流量)
tproxy-port: 7894

# 统一延迟
unified-delay: true
# GeoIP 使用 Country.mmdb
geodata-mode: false
# GeoIP 加载模式：standard（懒加载） / mem（预加载）
geodata-loader: standard
# GEO 数据文件自动更新
geo-auto-update: true
# 每隔 N小时 自动检查并更新 GEO 数据文件
geo-update-interval: 168
geox-url:
  # IP 地址与国家/地区的映射
  geoip: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geoip.dat'
  # geoip: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geoip.dat"
  # 域名与分类的映射（如广告、社交媒体等）
  geosite: 'https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/geosite.dat'
  # geosite: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/release/geosite.dat"
  # 更高精度的 IP 数据库
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  # GeoIP 数据的来源
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
# TCP 并发
tcp-concurrent: false
# 识别进程模式：off（关闭进程识别，不启用 PROCESS-NAME 规则。性能最佳，适合路由器等设备） / strict（严格模式，只有成功识别进程才应用 PROCESS-NAME 规则。失败则不匹配） / always（始终尝试识别进程，即使失败也会继续尝试匹配规则。可能影响性能）
# find-process-mode: strict

# 允许局域网的连接（可用来共享代理）
allow-lan: true
# 工作模式：rule（规则） / global（全局代理）/ direct（全局直连）
mode: rule
# 设置日志输出级别 (默认级别：silent，即不输出任何内容，以避免因日志内容过大而导致程序内存溢出）。
# 5 个级别：silent / info / warning / error / debug。级别越高日志输出量越大，越倾向于调试，若需要请自行开启。
log-level: warning
# IPv6 支持
ipv6: true
# UDP 支持
udp: true

bind-address: '*'
#endregion

#region MITM 设置
# mitm:
#   enable: true
#   ca:
#     cert: ./mitm-ca.pem
#     key: ./mitm-ca-key.pem
#   port: 7892  # 必须与 mixed-port 一致，或单独指定
#endregion

#region 配置文件
profile:
  store-selected: true
  store-fake-ip: false
#endregion

#region 嗅探器
sniffer:
  # 是否启用嗅探器
  # 开启后对 redir-host 类型识别的流量进行强制嗅探
  # 包含 Tun、Redir 和 TProxy 或 DNS 为 redir-host
  # 全端口嗅探会解析所有 HTTP/TLS/QUIC 流量，内存占用高
  enable: false
  # 是否强制将 IP 映射为域名（即使已有域名）
  force-dns-mapping: false
  # 是否对纯 IP 流量进行嗅探
  # 风险：对纯 IP 流量进行嗅探会增加 CPU 开销。在 iOS 环境下，过高的资源占用可能导致网络扩展进程（Tunnel）被系统杀掉
  parse-pure-ip: false
  # 是否使用嗅探出的域名替代原始目标地址
  # 风险：强行将目标地址替换为嗅探出的域名。如果嗅探结果有误，或者该 App 使用了特殊的安全校验，会导致连接直接中断
  override-destination: false
  sniff:
    # HTTP 嗅探端口范围
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    # TLS 嗅探端口
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 强制嗅探的域名白名单
  force-domain: []
  # 跳过嗅探的域名黑名单
  skip-domain: []
#endregion

#region TUN 模块
tun:
  # 如果需要启用 TUN 模式，请设置为 true
  enable: true
  # system 或 gvisor
  stack: system
  endpoint-independent-nat: false
  # 自动路由
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false
  # 清空 DNS 劫持，减少 Fake-IP 映射
  dns-hijack: []
#endregion

#region DNS 设置
# 可选；若不配置，程序内置的 DNS 服务会被关闭
dns:
  enable: true
  prefer-h3: false
  listen: 127.0.0.1:1053
  # 当此选项为 false 时, AAAA 请求将返回空
  ipv6: true
  # 查询 hosts 并返回 IP 记录
  use-hosts: true
  # 处理 DNS 请求时，是否强制先匹配 rules（规则）再决定解析策略
  respect-rules: false
  # 使用系统 hosts 文件
  use-system-hosts: false
  # fake-ip 或 redir-host
  enhanced-mode: redir-host
  # Fake IP 地址池 (CIDR 形式)
  fake-ip-range: 198.18.0.1/16
  # 在以下列表的域名将不会被解析为 fake ip，这些域名相关的解析请求将会返回它们真实的 IP 地址
  fake-ip-filter: ["*", +.lan]
  # 以下填写的 DNS 服务器将会被用来解析 DNS 服务的域名
  # 仅填写 DNS 服务器的 IP 地址
  default-nameserver: [223.5.5.5, 223.6.6.6]
  # 支持 UDP / TCP / DoT / DoH 协议的 DNS 服务，可以指明具体的连接端口号。
  # 所有 DNS 请求将会直接发送到服务器，不经过任何代理。
  # Clash 会使用最先获得的解析记录回复 DNS 请求
  nameserver: [https://223.5.5.5/dns-query, https://223.6.6.6/dns-query]
  # proxy-server-nameserver: [223.5.5.5, 223.6.6.6]
  # 当 fallback 参数被配置时, DNS 请求将同时发送至上方 nameserver 列表和下方 fallback 列表中配置的所有 DNS 服务器.
  # 当解析得到的 IP 地址的地理位置不是 CN 时，clash 将会选用 fallback 中 DNS 服务器的解析结果。
  # fallback: []
  # 如果使用 nameserver 列表中的服务器解析的 IP 地址在下方列表中的子网中，则它们被认为是无效的，
  # Clash 会选用 fallback 列表中配置 DNS 服务器解析得到的结果。
  #
  # 当 fallback-filter.geoip 为 true 且 IP 地址的地理位置为 CN 时，
  # Clash 会选用 nameserver 列表中配置 DNS 服务器解析得到的结果。
  #
  # 当 fallback-filter.geoip 为 false, 如果解析结果不在 fallback-filter.ipcidr 范围内，
  # Clash 总会选用 nameserver 列表中配置 DNS 服务器解析得到的结果。
  #
  # 采取以上逻辑进行域名解析是为了对抗 DNS 投毒攻击。
  # fallback-filter:
  #   geoip: false
  #   geoip-code: CN
  #   ipcidr:
  #     - 0.0.0.0/32
  #     - 0.0.0.0/8
  #     - 10.0.0.0/8
  #     - 100.64.0.0/10
  #     - 127.0.0.0/8
  #     - 169.254.0.0/16
  #     - 172.16.0.0/12
  #     - 192.0.0.0/24
  #     - 192.0.2.0/24
  #     - 192.88.99.0/24
  #     - 192.168.0.0/16
  #     - 198.18.0.0/15
  #     - 198.51.100.0/24
  #     - 203.0.113.0/24
  #     - 224.0.0.0/4
  #     - 240.0.0.0/4
  #     - 255.255.255.255/32
  #   domain: []
#endregion

#region 锚点
Anchors:
  # [url-test | fallback | load-balance]策略组测速间隔（秒）
  TestInterval: &TestInterval 300
  # [url-test | fallback | load-balance]略组测速容差（毫秒）
  TestTolerance: &TestTolerance 50
  # [url-test | fallback | load-balance]策略组测速超时（毫秒）（超出则判定为失败）
  TestTimeout: &TestTimeout 5000
  # [url-test | fallback | load-balance]策略组测速失败次数（超出则自动触发健康检查）
  TestMaxFailedTimes: &TestMaxFailedTimes 3
  # 全局网络连通性检测 url
  InternetTestUrl: &InternetTestUrl 'http://connectivitycheck.platform.hicloud.com/generate_204'
  # 代理节点延迟测速 url
  ProxyTestUrl: &ProxyTestUrl 'http://cp.cloudflare.com/generate_204'
  # 更新间隔（秒）
  UpdateInterval: &UpdateInterval 86400
  # 健康检查间隔（秒）
  HealthCheckInterval: &HealthCheckInterval 6
  # 策略组 [url-test每 TestInterval 秒一次惰性测速检查，容差 TestTolerance 毫秒，时延超过 TestTimeout 毫秒判定为失败，失败 TestMaxFailedTimes 次则自动触发健康检查]
  UrlTest:
    &UrlTest {
      type: url-test,
      url: *ProxyTestUrl,
      interval: *TestInterval,
      tolerance: *TestTolerance,
      lazy: true,
      timeout: *TestTimeout,
      max-failed-times: *TestMaxFailedTimes,
      include-all: false
    }
  # 策略组 [fallback每 TestInterval 秒一次惰性测速检查，容差 TestTolerance 毫秒，时延超过 TestTimeout 毫秒判定为失败，失败 TestMaxFailedTimes 次则自动触发健康检查]
  FallBack:
    &FallBack {
      type: fallback,
      url: *ProxyTestUrl,
      interval: *TestInterval,
      tolerance: *TestTolerance,
      lazy: true,
      timeout: *TestTimeout,
      max-failed-times: *TestMaxFailedTimes,
      include-all: false
    }
  # 规则集 [每 UpdateInterval 秒更新一次订阅规则]
  RuleProviders: &RuleProviders { type: http, behavior: classical, interval: *UpdateInterval }
  # 代理集 [每 UpdateInterval 秒更新一次订阅节点，每 HealthCheckInterval 秒一次健康检查]
  ProxyProviders: &ProxyProviders { type: http, interval: *UpdateInterval, health-check: { enable: true, url: *InternetTestUrl, interval: *HealthCheckInterval } }
  # 正则筛选（正则中避免出现中文、emoji，会不兼容）
  Filters:
    Filter_Region_HK: &Filter_Region_HK ^(?=.*((?i)🇭🇰|香港|(\b(HK|HKG|Hong)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_MO: &Filter_Region_MO ^(?=.*((?i)🇲🇴|澳门|(\b(MO|MAC|Macau|Macao)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_TW: &Filter_Region_TW ^(?=.*((?i)🇹🇼|台湾|(\b(TW|TWN|Tai|Taiwan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_JP: &Filter_Region_JP ^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|JPN|Japan)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_KR: &Filter_Region_KR ^(?=.*((?i)🇰🇷|韩国|韓|南朝鲜|首尔|(\b(KR|KOR|Korea)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_SG: &Filter_Region_SG ^(?=.*((?i)🇸🇬|新加坡|星洲|狮城|狮|(\b(SG|SGP|Singapore)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_MY: &Filter_Region_MY ^(?=.*((?i)🇲🇾|马来西亚|大马|马来|(\b(MY|Malaysia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_IN: &Filter_Region_IN ^(?=.*((?i)🇮🇳|印度|新德里|印|(\b(IN|IND|India)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_US: &Filter_Region_US ^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|(\b(US|USA|United States)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_CA: &Filter_Region_CA ^(?=.*((?i)🇨🇦|加拿大|多伦多|蒙特利尔|温哥华|(\b(CA|Canada)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_AU: &Filter_Region_AU ^(?=.*((?i)🇦🇺|澳大利亚|澳洲|澳|悉尼|墨尔本|(\b(AU|Australia)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_UK: &Filter_Region_UK ^(?=.*((?i)🇬🇧|英国|伦敦|英|(\b(GB|UK|United Kingdom|England|Britain)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_FR: &Filter_Region_FR ^(?=.*((?i)🇫🇷|法国|法兰西|巴黎|法|(\b(FR|France)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_DE: &Filter_Region_DE ^(?=.*((?i)🇩🇪|德国|德意志|柏林|德|(\b(DE|GER|Germany)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_IT: &Filter_Region_IT ^(?=.*((?i)🇮🇹|意大利|罗马|意|(\b(IT|Italy)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_NL: &Filter_Region_NL ^(?=.*((?i)🇳🇱|荷兰|阿姆斯特丹|鹿特丹|荷|(\b(NL|Holland|Netherlands|Nederland)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_LU: &Filter_Region_LU ^(?=.*((?i)🇱🇺|卢森堡|(\b(LU|Luxembourg|Luxemburg)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Region_LT: &Filter_Region_LT ^(?=.*((?i)🇱🇹|立陶宛|(\b(LT|Lithuania)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$
    Filter_Game: &Filter_Game ^(?=.*((?i)游戏|蒸汽平台|(\b(GAME|Steam)(\d+)?\b)))(?!.*((?i)回国|校园)).*$
    Filter_Global: &Filter_Global ^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel)\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$
    # Filter_Used: &Filter_Used ^(?=.*((?i)订阅|流量|到期|机场|过期|已用|使用|用量|(\b(USE|USED|TOTAL|EXPIRE|Channel|Traffic)(\d+)?\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$
#endregion

