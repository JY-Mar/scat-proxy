name: Generate Clash/Loon Resources

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新配置'
        required: false
        default: false
        type: boolean

  # main分支提交触发
  push:
    branches:
      - main
    paths:
      - 'Icons/Color/**'
      - 'Icons/Mono/**'
      - 'Icons/scripts/**'
      - 'Clash/Config/*.yaml'
      - 'Clash/Rules/*.yaml'
      - 'Loon/Config/*.lcf'
      - 'Loon/Rules/*.lsr'

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个部署任务同时运行
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  detect-icons:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: 🗂️ Create output directory
        run: |
          mkdir -p docs

      - name: 🗃️ Copy Clash to docs/Clash
        run: cp -r Clash docs/Clash

      - name: 🗃️ Copy Loon to docs/Loon
        run: cp -r Loon docs/Loon

      - name: 🗃️ Copy Icons to docs/Icons
        run: cp -r Icons docs/Icons

      - name: 🗃️ Copy style.css to docs/assets
        run: rsync -avP scripts/style.css docs/assets/

      - name: 🧠 Run grouping script in Icons/
        env:
          OUTPUT_DIR: docs
        run: python scripts/generate_images_json.py

      - name: 🧱 Generate index.html from images.json
        env:
          OUTPUT_DIR: docs
        run: |
          python scripts/generate_icons_html.py

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: 👉 Repository Dispatch "clash-yaml-merger"
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: JY-Mar/clash-yaml-merger
          event-type: trigger-from-scat-proxy
          # 可选：你还可以传递一些数据过去
          # client-payload: '{"ref": "${{ github.ref }}", "sha": "${{ github.sha }}"}'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: detect-icons

    steps:
      - name: ⬆️ Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
